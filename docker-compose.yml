version: '3.8'

services:
  vexa-postgres:
    image: postgres:15-alpine
    container_name: vexa-postgres
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - vexa-network

  vexa:
    image: vexaai/vexa-lite:latest
    container_name: vexa
    ports:
      - "8056:8056"
    environment:
      - DATABASE_URL=postgresql://${DB_USER}:${DB_PASSWORD}@vexa-postgres:5432/${DB_NAME}
      - ADMIN_API_TOKEN=${VEXA_ADMIN_API_KEY}
      - TRANSCRIPTION_SERVICE_URL=${TRANSCRIPTION_SERVICE_URL}
      - TRANSCRIPTION_SERVICE_TOKEN=${TRANSCRIPTION_SERVICE_TOKEN}
    depends_on:
      - vexa-postgres
    restart: unless-stopped
    networks:
      - vexa-network

  vexa-dashboard:
    build:
      context: .
    ports:
      - "3000:3000"
    environment:
      - VEXA_API_URL=${VEXA_API_URL:-http://vexa:8056}
      - VEXA_ADMIN_API_KEY=${VEXA_ADMIN_API_KEY}
      - VEXA_ADMIN_API_URL=${VEXA_ADMIN_API_URL:-http://vexa:8056}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
      - SMTP_FROM=${SMTP_FROM}
      - JWT_SECRET=${JWT_SECRET}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-}
      - ALLOW_REGISTRATIONS=${ALLOW_REGISTRATIONS:-true}
      - ALLOWED_EMAIL_DOMAINS=${ALLOWED_EMAIL_DOMAINS:-}
    depends_on:
      - vexa
    restart: unless-stopped
    networks:
      - vexa-network

networks:
  vexa-network:
    driver: bridge

volumes:
  postgres-data:
